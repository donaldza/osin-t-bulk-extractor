server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location = /bulk-extractor {
    return 308 /bulk-extractor/;
  }

  location /bulk-extractor/ {
    rewrite ^/bulk-extractor/(.*)$ /$1 break;
    try_files $uri /index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
